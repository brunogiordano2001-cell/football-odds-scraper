name: Match Alerts

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  send_alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache sent alerts
        uses: actions/cache@v4
        with:
          path: scripts/sent_alerts.json
          key: sent-alerts-${{ github.run_id }}
          restore-keys: |
            sent-alerts-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[app]" matplotlib

      - name: Run alert script
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_match_alerts.py
